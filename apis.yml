description: >-
  ClickPost is a logistics and supply chain platform that aggregates 500+ carrier integrations, multi-channel customer
  notifications, and 50+ storefront/OMS/WMS connectors behind a unified REST API. The platform covers carrier
  recommendation, order creation (single and multi-piece), serviceability, manifesting, pickups, real-time tracking with
  webhooks, proof of delivery, NDR (non-delivery report) management, returns, and expected delivery date forecasting for
  both Indian domestic and international shipments.
