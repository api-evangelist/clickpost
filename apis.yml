        type: Documentation
      - url: https://docs.clickpost.ai/
        type: Portal
      - url: openapi/clickpost-openapi.yml
        type: OpenAPI
    description: >-
      ClickPost's REST API provides programmatic access to carrier recommendation, order creation, cancellation,
      serviceability, manifesting, pickup scheduling, tracking (polling and webhooks), proof of delivery, NDR action
      management, returns, expected delivery date prediction, PUDO services, and rider/quick-commerce operations.
      Authentication is token-based.
