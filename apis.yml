    humanURL: https://docs.clickpost.ai/docs/getting-started
    properties:
      - url: https://docs.clickpost.ai/docs/getting-started
        type: Documentation
      - url: https://docs.clickpost.ai/
        type: Portal
    description: >-
      ClickPost's REST API provides programmatic access to carrier
      recommendation, order creation, cancellation, serviceability,
      manifesting, pickup scheduling, tracking (polling and webhooks),
      proof of delivery, NDR action management, returns, expected
      delivery date prediction, PUDO services, and rider/quick-commerce
      operations. Authentication is token-based.
