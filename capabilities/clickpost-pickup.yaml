naftiko: 1.0.0-alpha2
info:
  label: ClickPost API — Pickup
  description: 'ClickPost API — Pickup. 1 operations. Lead operation: Request a pickup. Self-contained Naftiko capability
    covering one Clickpost business surface.'
  tags:
  - Clickpost
  - Pickup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLICKPOST_API_KEY: CLICKPOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: clickpost-pickup
    baseUri: https://www.clickpost.in/api/v1
    description: ClickPost API — Pickup business capability. Self-contained, no shared references.
    resources:
    - name: pickup-request
      path: /pickup-request
      operations:
      - name: requestpickup
        method: POST
        description: Request a pickup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: key
      value: '{{env.CLICKPOST_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: clickpost-pickup-rest
    port: 8080
    description: REST adapter for ClickPost API — Pickup. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/pickup-request
      name: pickup-request
      description: REST surface for pickup-request.
      operations:
      - method: POST
        name: requestpickup
        description: Request a pickup
        call: clickpost-pickup.requestpickup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: clickpost-pickup-mcp
    port: 9090
    transport: http
    description: MCP adapter for ClickPost API — Pickup. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: request-pickup
      description: Request a pickup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: clickpost-pickup.requestpickup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
